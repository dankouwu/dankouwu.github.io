<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Personal Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <script src="script.js" defer></script>


    <script>
        tailwind.config = {
            theme: {
                fontFamily: {
                    sans: ['Ubuntu', 'sans-serif'],
                },
                extend: {
                    colors: {
                        primarytext: '#ffffff',
                        secondarytext: '#999999',
                        background: '#000000',
                        cardbackground: '#1a1a1a',
                        cardhighlighted: '#2a2a2a',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-primarytext flex flex-col items-center min-h-screen w-full">
    <nav
        class="w-full fixed top-0 left-0 right-0 flex items-center justify-center py-4 z-10 backdrop-blur-md bg-black/40 border-b border-white/5">
        <ul class="flex flex-row items-center justify-center gap-8 md:gap-12">
            <li>
                <a href="dashboard.html"
                    class="text-white font-bold hover:text-white/70 transition-all duration-300">Dashboard</a>
            </li>
            <li>
                <a href="#"
                    class="text-secondarytext font-bold hover:text-white transition-all duration-300">Calendar</a>
            </li>
            <li>
                <a href="#"
                    class="text-secondarytext font-bold hover:text-white transition-all duration-300">Settings</a>
            </li>
        </ul>
    </nav>

    <header class="mb-8 mt-24 w-[90%] md:w-[70%] lg:w-[60%]">
        <h1 class="text-start text-4xl font-bold tracking-tight">Personal Dashboard<span class="text-pink-300">.</span>
        </h1>
        <p class="text-start text-secondarytext text-lg mt-2">A centralized hub for your tasks, projects, and life.</p>
    </header>

    <main id="content" class="flex flex-col lg:flex-row justify-start w-[90%] md:w-[70%] lg:w-[60%] gap-12 pb-16">
    </main>

    <template id="categoryTemplate">
        <section class="flex-1 min-w-[300px]">
            <h2 class="text-start text-white/40 text-sm font-bold tracking-[0.2em] uppercase mb-4">Title</h2>
            <div class="mb-6 w-full h-[1px] bg-gradient-to-r from-white/50 to-transparent"></div>
            <ul class="flex flex-col items-start justify-start gap-4">
            </ul>
        </section>
    </template>

    <template id="listItem">
        <li
            class="w-full text-start bg-cardbackground text-primarytext border-white/10 border-[1px] rounded-2xl p-5 hover:bg-cardhighlighted hover:border-white/20 hover:shadow-xl hover:shadow-black/50 transition-all duration-300 group">
            <h3 class="font-bold text-lg mb-2 group-hover:text-pink-300 transition-colors">Item Title</h3>
            <div class="flex flex-col items-start gap-3">
                <p class="text-secondarytext text-sm leading-relaxed">Item Description</p>
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-secondarytext opacity-50"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-secondarytext/40 text-xs font-mono uppercase tracking-wider">Due Date</p>
                </div>
            </div>
        </li>
    </template>
</body>

</html>
